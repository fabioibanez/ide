name: Bump debugger-sh engine

on:
  schedule:
    # Every day at 09:00 UTC. Change as needed.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so the commit we push uses GITHUB_TOKEN auth
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump debugger-sh to latest
        id: bump
        run: |
          set -euo pipefail
          OLD_VERSION=$(node -p "require('./package.json').dependencies['debugger-sh']")
          npm install debugger-sh@latest --save
          NEW_VERSION=$(node -p "require('./package.json').dependencies['debugger-sh']")
          echo "old=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if git diff --quiet -- package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump debugger-sh ${{ steps.bump.outputs.old }} -> ${{ steps.bump.outputs.new }}"
          git push
